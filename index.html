<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLink | Instant Shortener</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">NexLink<span>.io</span></div>
            <nav>
                <div class="nav-item active">Link Generator</div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Quick Redirect Engine</h2>
                <div class="status-indicator">● System Online</div>
            </header>

            <section class="generator-card">
                <div class="card-header">
                    <h3>URL Shortener</h3>
                </div>
                
                <div class="input-group">
                    <input type="url" id="longUrl" placeholder="Paste your long link here..." required>
                    <button onclick="shortenMultiple()" id="generateBtn">Shorten Now</button>
                </div>

                <div id="results-container" class="results-grid">
                    </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
